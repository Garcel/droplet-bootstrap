---
- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  notify: Wait for SSH

- name: Wait for SSH
  ansible.builtin.wait_for:
    port: 22
    host: "{{ ansible_host }}"
    delay: 3
    timeout: 30

- name: Restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted
