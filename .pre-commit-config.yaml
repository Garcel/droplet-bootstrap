---
repos:
  # Generic
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: end-of-file-fixer

  # Yaml
  - repo: https://github.com/adrienverge/yamllint.git
    rev: cba56bcde1fdd01c1deb3f945e69764c291a6530
    hooks:
      - id: yamllint
        entry: yamllint --strict

  # Scripts
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: 745eface02aef23e168a8afb6b5737818efbea95
    hooks:
      - id: shellcheck
        types: [shell]

  - repo: https://github.com/openstack/bashate
    rev: fbd7c2534c2701351c603ff700ddf08202430a31
    hooks:
      - id: bashate
        types: [shell]

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: e72a3ca1632f0b11a07d171449fe447a7ff6795e
    hooks:
      - id: markdownlint
        args: ["--fix"]

  ## Ansible
  - repo: https://github.com/ansible/ansible-lint.git
    rev: 8ba9595a4acd1b906eb75568b34f6ef592cd1528
    hooks:
      - id: ansible-lint
        files: \.(yaml|yml)$
        name: Ansible Lint
        description: Run configurations on .ansible-lint file
        additional_dependencies:
          - .[community]

  ## Terraform
  - repo: https://github.com/terraform-docs/terraform-docs
    rev: 0643382b16ca523deb9c002434df95e825979a45
    hooks:
      - id: terraform-docs-go
        args: ["markdown", "table", "terraform"]

  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: d0e12caebb2ab0ee8bf98181c8bfe9702bca103d
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
